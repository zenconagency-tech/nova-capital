# render.yaml — Render "Infrastructure as Code"
#
# Deploy with:  https://render.com/deploy?repo=https://github.com/zenconagency-tech/nova-capital
# Or:           render blueprint launch  (in Render dashboard)
#
# Two services are declared:
#   1. web  — the Node.js + Express app
#   2. (optional) Redis if you want the maintenance cache to survive
#      instance restarts.  Currently it uses an in-memory cache, so this
#      is commented out — uncomment if/when you want cross-instance state.
#
# All secrets use `generateValue: true` so Render creates a strong random
# string on first deploy.  You only need to fill in the Supabase + SMTP
# values via the Render dashboard → Environment tab.

services:
  - type: web
    name: nova-capital
    runtime: node
    plan: free                     # change to "starter" ($7/mo) to disable sleep
    region: oregon
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # --- server ---
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000                # Render's default; harmless to keep
      - key: APP_NAME
        value: Nova Capital
      # APP_URL is auto-set by Render to the service's external URL

      # --- security ---
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ADMIN_JWT_EXPIRES_IN
        value: 24h
      - key: JWT_COOKIE_NAME
        value: nova_token
      - key: ADMIN_JWT_COOKIE_NAME
        value: nova_admin_token

      # --- admin seed (change ADMIN_PASSWORD in dashboard after first deploy) ---
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: CHANGE_ME_NOW_8chars

      # --- Supabase (paste from supabase.com → Project Settings → API) ---
      - key: SUPABASE_URL
        sync: false                 # set in Render dashboard
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      # --- SMTP (optional — without it, new users auto-verify) ---
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: Nova Capital <no-reply@nova.capital>
