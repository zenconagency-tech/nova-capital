<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under maintenance · Nova Capital</title>
  <meta name="theme-color" content="#0A0B0E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0' stop-color='%2300D4FF'/%3E%3Cstop offset='1' stop-color='%23A78BFA'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='16' y='22' font-family='Inter,sans-serif' font-size='18' font-weight='800' fill='%230A0B0E' text-anchor='middle'%3EN%3C/text%3E%3C/svg%3E" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 24px; }
    .maintenance-card {
      max-width: 540px; text-align: center;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 48px 32px;
      box-shadow: var(--shadow-2);
    }
    .maintenance-card .logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 28px; }
    .maintenance-card h1 { font-size: 28px; margin: 0 0 12px; color: var(--text-0); }
    .maintenance-card p { color: var(--text-2); margin: 0 0 20px; }
    .maintenance-card .spinner-icon {
      width: 64px; height: 64px; margin: 0 auto 24px;
      display: grid; place-items: center;
      border-radius: 16px;
      background: var(--accent-soft);
      border: 1px solid rgba(0, 212, 255, 0.25);
      color: var(--accent);
    }
    .maintenance-card .spinner-icon svg { width: 32px; height: 32px; animation: spin 2s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="maintenance-card fade-in">
    <a href="/" class="logo">
      <span class="logo-mark"></span>
      <span>Nova<span style="color:var(--accent)">.</span></span>
    </a>
    <div class="spinner-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" stroke-dasharray="40 60"/>
        <path d="M12 2a10 10 0 0 1 10 10"/>
      </svg>
    </div>
    <h1>We'll be right back</h1>
    <p>Nova Capital is currently undergoing scheduled maintenance. We're working hard to improve your experience and will be back online shortly.</p>
    <p class="text-dim" style="font-size: 13px;">Thank you for your patience.</p>
  </div>
</body>
</html>
