<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set a new password · Nova Capital</title>
  <meta name="theme-color" content="#0A0B0E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0' stop-color='%2300D4FF'/%3E%3Cstop offset='1' stop-color='%23A78BFA'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='16' y='22' font-family='Inter,sans-serif' font-size='18' font-weight='800' fill='%230A0B0E' text-anchor='middle'%3EN%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card fade-in">
      <a href="/" class="logo" style="justify-content:center; margin-bottom:20px; display:flex;">
        <span class="logo-mark"></span>
        <span>Nova<span style="color:var(--accent)">.</span></span>
      </a>

      <div class="head">
        <h1>Set a new password</h1>
        <p>Enter the reset code from your email and choose a new password.</p>
      </div>

      <div id="alert"></div>

      <form id="resetForm" novalidate>
        <input type="hidden" id="token" />
        <div class="form-group">
          <label for="password">New password</label>
          <input id="password" type="password" class="input" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label for="confirm">Confirm new password</label>
          <input id="confirm" type="password" class="input" placeholder="Repeat password" required minlength="8" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">Update password</button>
      </form>

      <div class="footer-link" style="margin-top:18px;">
        <a href="/login">Back to login</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/toast.js"></script>
  <script>
    const url = new URL(location.href);
    const token = url.searchParams.get('token') || '';
    document.getElementById('token').value = token;
    if (!token) {
      NovaToast.error('Missing or invalid reset link. Please request a new one.');
      document.getElementById('submitBtn').disabled = true;
    }

    const form = document.getElementById('resetForm');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = form.password.value;
      const confirm = form.confirm.value;
      if (password !== confirm) return NovaToast.error('Passwords do not match.');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Updating...';
      try {
        await NovaAPI.resetPassword(token, password, confirm);
        NovaToast.success('Password updated. Redirecting to login…');
        setTimeout(() => location.replace('/login'), 1500);
      } catch (err) {
        NovaToast.error(err.message || 'Failed to reset password');
        btn.disabled = false;
        btn.textContent = 'Update password';
      }
    });
  </script>
</body>
</html>
