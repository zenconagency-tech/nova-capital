<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Nova Capital</title>
  <meta name="theme-color" content="#0A0B0E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0' stop-color='%2300D4FF'/%3E%3Cstop offset='1' stop-color='%23A78BFA'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='16' y='22' font-family='Inter,sans-serif' font-size='18' font-weight='800' fill='%230A0B0E' text-anchor='middle'%3EN%3C/text%3E%3C/svg%3E" />
  <style>
    body { background: #050608; }
    .admin-shell {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 40px 24px; position: relative; overflow: hidden;
    }
    .admin-shell::before {
      content: ""; position: absolute; inset: 0; z-index: -1;
      background:
        radial-gradient(600px 300px at 20% 20%, rgba(255,77,109,0.08), transparent 60%),
        radial-gradient(600px 300px at 80% 80%, rgba(0,212,255,0.06), transparent 60%);
    }
    .admin-card {
      width: 100%; max-width: 420px;
      background: var(--bg-2);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-xl);
      padding: 32px;
      box-shadow: var(--shadow-2);
      position: relative;
    }
    .admin-card .badge {
      position: absolute; top: 18px; right: 18px;
      font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase;
      color: var(--loss); font-weight: 700; padding: 4px 8px;
      border: 1px solid rgba(255,77,109,0.30); background: var(--loss-soft);
      border-radius: 4px;
    }
    .admin-card h1 { margin: 0 0 6px; font-size: 22px; color: var(--text-0); }
    .admin-card p.lead { color: var(--text-3); margin: 0 0 24px; font-size: 13.5px; }
    .admin-card .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  </style>
</head>
<body>
  <div class="admin-shell">
    <div class="admin-card fade-in">
      <span class="badge">Restricted</span>
      <a href="/" class="logo">
        <span class="logo-mark"></span>
        <span>Nova<span style="color:var(--accent)">.</span></span>
      </a>
      <h1>Admin sign in</h1>
      <p class="lead">This panel is for authorised staff only. All activity is logged.</p>

      <div id="alert"></div>

      <form id="adminLoginForm" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" class="input" placeholder="admin" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" class="input" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">Sign in</button>
      </form>

      <div class="footer-link" style="margin-top:18px;">
        <a href="/">← Back to site</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/toast.js"></script>
  <script>
    // already signed in? jump to dashboard
    if (NovaAPI.getAdminToken()) {
      NovaAPI.adminMe()
        .then(({ data }) => { if (data && data.admin) location.replace('/admin/dashboard'); })
        .catch(() => NovaAPI.setAdminToken(null));
    }

    const form = document.getElementById('adminLoginForm');
    const alertEl = document.getElementById('alert');
    const btn = document.getElementById('submitBtn');
    const showAlert = (type, msg) => { alertEl.innerHTML = `<div class="alert ${type}">${msg}</div>`; };

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.innerHTML = '';
      const username = form.username.value.trim();
      const password = form.password.value;
      if (!username || !password) return showAlert('error', 'Enter your credentials.');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Authenticating…';
      try {
        const { data } = await NovaAPI.adminLogin({ username, password });
        NovaAPI.setAdminToken(data.token);
        NovaToast.success('Signed in. Welcome back.');
        setTimeout(() => location.replace('/admin/dashboard'), 200);
      } catch (err) {
        showAlert('error', err.message || 'Sign-in failed');
        btn.disabled = false; btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
