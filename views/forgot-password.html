<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password · Nova Capital</title>
  <meta name="theme-color" content="#0A0B0E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0' stop-color='%2300D4FF'/%3E%3Cstop offset='1' stop-color='%23A78BFA'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='16' y='22' font-family='Inter,sans-serif' font-size='18' font-weight='800' fill='%230A0B0E' text-anchor='middle'%3EN%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card fade-in">
      <a href="/" class="logo" style="justify-content:center; margin-bottom:20px; display:flex;">
        <span class="logo-mark"></span>
        <span>Nova<span style="color:var(--accent)">.</span></span>
      </a>

      <div class="head">
        <h1>Reset your password</h1>
        <p>Enter your email and we'll send you a reset link.</p>
      </div>

      <div id="alert"></div>

      <form id="forgotForm" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" class="input" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">Send reset link</button>
      </form>

      <div class="footer-link" style="margin-top:18px;">
        Remembered it? <a href="/login">Back to login</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/toast.js"></script>
  <script>
    const form = document.getElementById('forgotForm');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = form.email.value.trim();
      if (!email) return NovaToast.warning('Please enter your email.');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Sending...';
      try {
        const { message } = await NovaAPI.forgotPassword(email);
        NovaToast.success(message || 'If an account exists, a reset link has been sent.');
        form.reset();
      } catch (err) {
        NovaToast.error(err.message || 'Something went wrong');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send reset link';
      }
    });
  </script>
</body>
</html>
