<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in · Nova Capital</title>
  <meta name="theme-color" content="#0A0B0E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0' stop-color='%2300D4FF'/%3E%3Cstop offset='1' stop-color='%23A78BFA'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='16' y='22' font-family='Inter,sans-serif' font-size='18' font-weight='800' fill='%230A0B0E' text-anchor='middle'%3EN%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card fade-in">
      <a href="/" class="logo" style="justify-content:center; margin-bottom:20px; display:flex;">
        <span class="logo-mark"></span>
        <span>Nova<span style="color:var(--accent)">.</span></span>
      </a>

      <div class="head">
        <h1>Welcome back</h1>
        <p>Log in to access your portfolio.</p>
      </div>

      <div id="alert"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" class="input" placeholder="you@example.com" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" class="input" placeholder="Your password" required autocomplete="current-password" minlength="6" />
        </div>

        <div class="form-row">
          <label><input type="checkbox" class="checkbox" id="remember" /> Remember me</label>
          <a href="/forgot-password">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">
          Log in
        </button>
      </form>

      <div class="divider">or</div>

      <a href="/register" class="btn btn-secondary btn-block">Create a new account</a>

      <div class="footer-link">
        By logging in, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/toast.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const alertEl = document.getElementById('alert');
    const btn = document.getElementById('submitBtn');

    // already logged in? bounce
    if (NovaAPI.getToken()) {
      NovaAPI.me()
        .then(({ data }) => { if (data && data.user) location.replace('/dashboard'); })
        .catch(() => NovaAPI.setToken(null));
    }

    const showAlert = (type, msg) => { alertEl.innerHTML = `<div class="alert ${type}">${msg}</div>`; };

    // pre-fill ?verified=1
    const url = new URL(location.href);
    if (url.searchParams.get('verified') === '1') {
      NovaToast.success('Email verified! You can now log in.');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.innerHTML = '';
      const email = form.email.value.trim();
      const password = form.password.value;

      if (!email || !password) return showAlert('error', 'Please fill in all fields.');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Logging in...';

      try {
        const { data } = await NovaAPI.login({ email, password });
        NovaAPI.setToken(data.token);
        NovaToast.success('Logged in. Welcome back.');
        setTimeout(() => location.replace('/dashboard'), 200);
      } catch (err) {
        if (err.data && err.data.details && err.data.details.code === 'EMAIL_NOT_VERIFIED') {
          showAlert(
            'error',
            `Your email isn't verified yet. <a href="#" id="resendLink" style="color:var(--accent); font-weight:500;">Resend verification email</a>`
          );
          document.getElementById('resendLink').addEventListener('click', async (ev) => {
            ev.preventDefault();
            try {
              await NovaAPI.resendVerification(email);
              NovaToast.info('Verification email re-sent. Check your spam folder too.');
            } catch (e) { /* ignore */ }
          });
        } else {
          NovaToast.error(err.message || 'Login failed');
        }
        btn.disabled = false;
        btn.textContent = 'Log in';
      }
    });
  </script>
</body>
</html>
